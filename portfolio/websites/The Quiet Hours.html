document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"594f13f8-90fe-406b-9006-2e38a33d87f3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{background:#0A0E14;color:#F6EFE6;font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden}\n  ::selection{background:rgba(244,162,76,.4);color:#fff}\n  @keyframes qhFade{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}\n  @keyframes qhBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}\n  @keyframes qhDrip{0%{transform:translateY(0) scale(.6);opacity:0}18%{opacity:1}100%{transform:translateY(var(--qhfall,180px)) scale(1);opacity:0}}\n  @keyframes qhBlink{0%,100%{opacity:1}50%{opacity:.25}}\n  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}\n<\u002Fstyle>\n<script src=\"61a8dba2-a38e-4331-a028-98deee6f6cce\"><\u002Fscript>\n<script src=\"44656dfc-38ce-4f46-8859-ab28ab1f3abd\"><\u002Fscript>\n<\u002Fhelmet>\n\n\n\n<div ref=\"{{ rootRef }}\" style=\"position:relative;width:100%\">\n\n  <!-- fallback gradient (no-WebGL / reduced motion) -->\n  <div ref=\"{{ bgRef }}\" aria-hidden=\"true\" style=\"position:fixed;inset:0;z-index:0;background:#0A0E14\"><\u002Fdiv>\n\n  <!-- WebGL stage -->\n  <canvas ref=\"{{ glRef }}\" aria-hidden=\"true\" style=\"position:fixed;inset:0;width:100vw;height:100vh;z-index:1;display:block\"><\u002Fcanvas>\n\n  <!-- grain + vignette -->\n  <div aria-hidden=\"true\" style=\"position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(120% 120% at 50% 38%,transparent 52%,rgba(0,0,0,.42) 100%)\"><\u002Fdiv>\n  <div ref=\"{{ grainRef }}\" aria-hidden=\"true\" style=\"position:fixed;inset:-50%;z-index:2;pointer-events:none;opacity:.06;mix-blend-mode:overlay;background-image:url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC45IiBudW1PY3RhdmVzPSIyIi8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsdGVyPSJ1cmwoI24pIi8+PC9zdmc+')\"><\u002Fdiv>\n\n  <!-- nav -->\n  <nav style=\"position:fixed;top:0;left:0;right:0;z-index:30;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(18px,4vw,42px);mix-blend-mode:normal\">\n    <a href=\"#qh-top\" onclick=\"{{ onTop }}\" style=\"display:flex;align-items:center;gap:10px;text-decoration:none\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 48 48\" fill=\"none\"><path d=\"M16 13 V35\" stroke=\"#F6EFE6\" stroke-width=\"4.6\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M32 13 V35\" stroke=\"#F6EFE6\" stroke-width=\"4.6\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M16 24 H32\" stroke=\"#F0A22B\" stroke-width=\"4.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n      <span ref=\"{{ wordmarkRef }}\" style=\"font-family:Archivo,sans-serif;font-weight:800;font-size:17px;letter-spacing:-.02em;color:#F6EFE6\">Handbuilt<\u002Fspan>\n    <\u002Fa>\n    <div style=\"display:flex;align-items:center;gap:14px\">\n      <button onclick=\"{{ onSound }}\" ref=\"{{ soundRef }}\" aria-label=\"Toggle sound\" style=\"display:inline-flex;align-items:center;gap:7px;height:36px;padding:0 12px;border-radius:999px;border:1px solid rgba(246,239,230,.22);background:rgba(10,14,20,.3);backdrop-filter:blur(8px);color:#C9C2B8;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer\">\n        <span ref=\"{{ soundDotRef }}\" style=\"width:7px;height:7px;border-radius:50%;background:#6F6862\"><\u002Fspan><span ref=\"{{ soundTxtRef }}\">Sound off<\u002Fspan>\n      <\u002Fbutton>\n      <a href=\"#qh-act7\" onclick=\"{{ onStart }}\" ref=\"{{ navCtaRef }}\" style=\"display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 18px;border-radius:11px;background:#F6EFE6;color:#14110F;font-size:13.5px;font-weight:700;text-decoration:none\">Start a build\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- timestamp -->\n  <div ref=\"{{ tsWrapRef }}\" style=\"position:fixed;top:74px;right:clamp(18px,4vw,42px);z-index:30;text-align:right;font-family:'JetBrains Mono',monospace;color:#C9C2B8\">\n    <div ref=\"{{ tsRef }}\" style=\"font-size:clamp(20px,2.4vw,30px);font-weight:500;letter-spacing:.02em;color:#F6EFE6;font-variant-numeric:tabular-nums\">11:47 PM<\u002Fdiv>\n    <div ref=\"{{ tsLabelRef }}\" style=\"font-size:10px;letter-spacing:.16em;text-transform:uppercase;opacity:.65;margin-top:2px\">The quiet hours<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- act rail -->\n  <div ref=\"{{ railRef }}\" style=\"position:fixed;left:clamp(14px,3vw,30px);top:50%;transform:translateY(-50%);z-index:30;display:flex;flex-direction:column;gap:13px\"><\u002Fdiv>\n\n  <!-- ===================== ACTS ===================== -->\n  <main style=\"position:relative;z-index:10\">\n\n    <!-- ACT I -->\n    <section id=\"qh-top\" data-act=\"0\" data-screen-label=\"Act I — 11:47 PM\" data-tone=\"dark\" style=\"position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 clamp(18px,5vw,68px) clamp(54px,9vh,108px)\">\n      <div data-reveal=\"\" style=\"max-width:920px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#9FB1C8;margin-bottom:18px\">Act I · The Overflow begins<\u002Fdiv>\n        <h1 style=\"margin:0;font-family:Archivo,sans-serif;font-weight:800;letter-spacing:-.03em;line-height:.94;font-size:clamp(40px,8.4vw,124px);color:#F6EFE6;text-wrap:balance;text-shadow:0 2px 40px rgba(0,0,0,.5)\">The work doesn't<br>stop when you do.<\u002Fh1>\n        <p style=\"margin:26px 0 0;max-width:46ch;font-size:clamp(16px,1.7vw,20px);line-height:1.55;color:#C9C2B8\">It's 11:47 PM. The calls, the quotes, the unanswered texts — they pile up in the dark while you try to switch off. Scroll toward morning.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ACT II -->\n    <section id=\"qh-act2\" data-act=\"1\" data-screen-label=\"Act II — The Overflow\" data-tone=\"dark\" style=\"position:relative;min-height:110vh;display:flex;flex-direction:column;justify-content:center;padding:80px clamp(18px,5vw,68px)\">\n      <div data-reveal=\"\" style=\"max-width:560px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#9FB1C8;margin-bottom:16px\">Act II<\u002Fdiv>\n        <h2 style=\"margin:0;font-family:Archivo,sans-serif;font-weight:800;letter-spacing:-.026em;line-height:1.0;font-size:clamp(30px,4.6vw,58px);color:#F6EFE6\">Small business runs<br>on invisible work.<\u002Fh2>\n        <p style=\"margin:20px 0 0;max-width:42ch;font-size:clamp(15px,1.6vw,18px);line-height:1.55;color:#C9C2B8\">Every one of these is a job, a client, or a dollar — landing after hours, with no one to catch it.<\u002Fp>\n        <div style=\"margin-top:30px;display:flex;flex-wrap:wrap;gap:10px;max-width:480px\">\n          <sc-for list=\"{{ overflowChips }}\" as=\"c\" hint-placeholder-count=\"5\">\n            <span data-drop=\"\" style=\"display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;background:rgba(13,18,26,.55);border:1px solid rgba(159,177,200,.2);backdrop-filter:blur(8px);font-size:13.5px;font-weight:600;color:#DCD6CC\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ c.dot }}\"><\u002Fspan>{{ c.label }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ACT III -->\n    <section id=\"qh-act3\" data-act=\"2\" data-screen-label=\"Act III — The Catch\" data-tone=\"dark\" style=\"position:relative;min-height:135vh;display:flex;flex-direction:column;justify-content:center;padding:90px clamp(18px,5vw,68px)\">\n      <div data-reveal=\"\" style=\"max-width:1080px;margin:0 auto;width:100%\">\n        <div style=\"text-align:center;margin-bottom:30px\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#9FB1C8;margin-bottom:14px\">Act III · The Catch<\u002Fdiv>\n          <h2 style=\"margin:0;font-family:Archivo,sans-serif;font-weight:800;letter-spacing:-.026em;line-height:1.0;font-size:clamp(30px,4.8vw,60px);color:#F6EFE6\">Pour your work in.<\u002Fh2>\n          <p style=\"margin:16px auto 0;max-width:48ch;font-size:clamp(15px,1.6vw,18px);line-height:1.55;color:#C9C2B8\">Tell us what's landing on you after hours. Watch the right worker catch it.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"position:relative;max-width:620px;margin:0 auto\">\n          <form onsubmit=\"{{ onPour }}\" style=\"position:relative;display:flex;gap:10px;padding:8px;border-radius:18px;background:rgba(13,18,26,.6);border:1px solid rgba(244,162,76,.32);backdrop-filter:blur(12px);box-shadow:0 30px 70px -30px rgba(0,0,0,.7)\">\n            <input ref=\"{{ pourInputRef }}\" type=\"text\" placeholder=\"e.g. I keep missing calls while I'm on a job\" aria-label=\"Describe your after-hours work\" style=\"flex:1;min-width:0;height:52px;padding:0 16px;border:0;background:transparent;color:#F6EFE6;font-family:Inter,sans-serif;font-size:15.5px;outline:none\">\n            <button type=\"submit\" style=\"display:inline-flex;align-items:center;gap:8px;height:52px;padding:0 22px;border:0;border-radius:12px;background:#F4A24C;color:#14110F;font-size:14.5px;font-weight:700;cursor:pointer;white-space:nowrap\">Pour it in\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 5v14M5 12l7 7 7-7\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fform>\n          <canvas ref=\"{{ pourCanvasRef }}\" aria-hidden=\"true\" style=\"position:absolute;left:0;top:0;width:100%;height:340px;pointer-events:none;z-index:5\"><\u002Fcanvas>\n          <div style=\"margin-top:14px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center\">\n            <sc-for list=\"{{ pourSamples }}\" as=\"s\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ s.onClick }}\" style=\"cursor:pointer;border:1px solid rgba(159,177,200,.24);background:rgba(13,18,26,.4);color:#B9C2CE;font-size:12.5px;font-weight:500;padding:7px 12px;border-radius:999px\">{{ s.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- worker pods -->\n        <div style=\"margin-top:40px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;max-width:920px;margin-left:auto;margin-right:auto\">\n          <sc-for list=\"{{ pods }}\" as=\"p\" hint-placeholder-count=\"5\">\n            <div data-pod=\"{{ p.key }}\" ref=\"{{ regPod }}\" style=\"position:relative;padding:18px 16px;border-radius:16px;background:rgba(13,18,26,.5);border:1px solid rgba(159,177,200,.18);backdrop-filter:blur(8px);text-align:center;transition:border-color .4s,background .4s,transform .4s,box-shadow .4s\">\n              <div style=\"display:flex;justify-content:center;margin-bottom:11px\"><span style=\"display:inline-flex;width:42px;height:42px;border-radius:12px;align-items:center;justify-content:center;background:rgba(244,162,76,.12);color:#F4A24C\">{{ p.iconEl }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-family:Archivo,sans-serif;font-weight:700;font-size:14.5px;color:#F6EFE6\">{{ p.name }}<\u002Fdiv>\n              <div style=\"margin-top:5px;font-size:11.5px;line-height:1.4;color:#9AA4B2\">{{ p.tag }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- answer -->\n        <div ref=\"{{ pourAnswerRef }}\" style=\"overflow:hidden;max-height:0;opacity:0;transition:max-height .6s cubic-bezier(.22,1,.36,1),opacity .5s\">\n          <div style=\"margin:26px auto 0;max-width:600px;display:flex;gap:14px;align-items:flex-start;padding:18px 20px;border-radius:16px;background:rgba(244,162,76,.1);border:1px solid rgba(244,162,76,.4)\">\n            <span style=\"display:inline-flex;flex:none;width:34px;height:34px;border-radius:50%;background:#F4A24C;color:#14110F;align-items:center;justify-content:center;font-weight:800\">✦<\u002Fspan>\n            <div>\n              <div ref=\"{{ ansRouteRef }}\" style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#F4A24C;margin-bottom:6px\">Routed to<\u002Fdiv>\n              <div ref=\"{{ ansTextRef }}\" style=\"font-size:16px;line-height:1.5;color:#F6EFE6;font-weight:500\">—<\u002Fdiv>\n              <a href=\"#qh-act7\" onclick=\"{{ onStart }}\" style=\"margin-top:12px;display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:700;color:#F4A24C;text-decoration:none\">Start this build <span>→<\u002Fspan><\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ACT IV -->\n    <section id=\"qh-act4\" data-act=\"3\" data-screen-label=\"Act IV — Handbuilt\" data-tone=\"dark\" style=\"position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px clamp(18px,5vw,68px)\">\n      <div data-reveal=\"\" style=\"max-width:760px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#9FB1C8;margin-bottom:18px\">Act IV · The Studio<\u002Fdiv>\n        <h2 style=\"margin:0;font-family:Archivo,sans-serif;font-weight:900;letter-spacing:-.03em;line-height:.96;font-size:clamp(44px,8vw,108px);color:#F6EFE6\">Not generated.<br>Handbuilt.<\u002Fh2>\n        <p style=\"margin:24px auto 0;max-width:44ch;font-size:clamp(15px,1.7vw,19px);line-height:1.55;color:#C9C2B8\">No template farm. No reseller. One builder shapes each worker — wireframe to glass to filled — around your actual business.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ACT V -->\n    <section id=\"qh-act5\" data-act=\"4\" data-screen-label=\"Act V — By 6 AM\" data-tone=\"dawn\" style=\"position:relative;min-height:110vh;display:flex;flex-direction:column;justify-content:center;padding:80px clamp(18px,5vw,68px)\">\n      <div data-reveal=\"\" style=\"max-width:900px;margin-left:auto;text-align:right\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#9A6B2E;margin-bottom:16px\">Act V · 6:02 AM<\u002Fdiv>\n        <h2 style=\"margin:0;font-family:Archivo,sans-serif;font-weight:800;letter-spacing:-.028em;line-height:.98;font-size:clamp(34px,6vw,82px);color:#1E160E\">You slept.<br>It worked.<br>The morning's<br>already handled.<\u002Fh2>\n        <p style=\"margin:24px 0 0;margin-left:auto;max-width:42ch;font-size:clamp(15px,1.7vw,19px);line-height:1.55;color:#5A4632\">The liquid settled to amber overnight. Every call answered, every quote sent, every follow-up nudged — waiting in a tidy list when you wake.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ACT VI -->\n    <section id=\"qh-act6\" data-act=\"5\" data-screen-label=\"Act VI — Pricing\" data-tone=\"light\" style=\"position:relative;min-height:120vh;display:flex;flex-direction:column;justify-content:center;padding:90px clamp(18px,5vw,68px)\">\n      <div data-reveal=\"\" style=\"max-width:1120px;margin:0 auto;width:100%\">\n        <div style=\"text-align:center;margin-bottom:38px\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#9A6B2E;margin-bottom:14px\">Act VI · What you can hand over<\u002Fdiv>\n          <h2 style=\"margin:0;font-family:Archivo,sans-serif;font-weight:800;letter-spacing:-.026em;line-height:1.0;font-size:clamp(30px,4.6vw,56px);color:#1E160E\">Filled vessels, honest prices.<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;align-items:stretch\">\n          <sc-for list=\"{{ tiers }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <div style=\"{{ t.cardStyle }}\">\n              <sc-if value=\"{{ t.feat }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:#14110F;color:#F4A24C;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:5px 13px;border-radius:999px;white-space:nowrap\">Most businesses start here<\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:{{ t.tagColor }}\">{{ t.tag }}<\u002Fdiv>\n              <div style=\"margin-top:12px;display:flex;align-items:baseline;gap:6px\"><span style=\"font-family:Archivo,sans-serif;font-weight:800;font-size:34px;letter-spacing:-.02em;color:{{ t.priceColor }}\">{{ t.price }}<\u002Fspan><span style=\"font-size:13px;color:{{ t.smallColor }}\">{{ t.small }}<\u002Fspan><\u002Fdiv>\n              <div style=\"margin-top:10px;font-size:13.5px;line-height:1.5;color:{{ t.descColor }}\">{{ t.desc }}<\u002Fdiv>\n              <div style=\"margin-top:16px;padding-top:16px;border-top:1px solid {{ t.lineColor }};display:flex;flex-direction:column;gap:9px\">\n                <sc-for list=\"{{ t.points }}\" as=\"pt\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:flex-start;gap:8px;font-size:13px;color:{{ t.descColor }}\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ t.checkColor }}\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>{{ pt }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <a href=\"#qh-act7\" onclick=\"{{ onStart }}\" style=\"{{ t.btnStyle }}\">{{ t.btn }}<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fa>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:24px;text-align:center;font-size:14px;color:#5A4632\">Optional <b style=\"color:#1E160E\">Care Plan from $250/mo<\u002Fb> — monitoring, updates, and improvements.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ACT VII -->\n    <section id=\"qh-act7\" data-act=\"6\" data-screen-label=\"Act VII — Start a build\" data-tone=\"light\" style=\"position:relative;min-height:110vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:90px clamp(18px,5vw,68px)\">\n      <div data-reveal=\"\" style=\"max-width:780px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#9A6B2E;margin-bottom:18px\">Act VII · 6:14 AM — Full light<\u002Fdiv>\n        <h2 style=\"margin:0;font-family:Archivo,sans-serif;font-weight:800;letter-spacing:-.028em;line-height:1.0;font-size:clamp(38px,6.4vw,86px);color:#1E160E\">Tell me what's landing<br>on you after hours.<\u002Fh2>\n        <p style=\"margin:22px auto 0;max-width:46ch;font-size:clamp(15px,1.7vw,19px);line-height:1.55;color:#5A4632\">Describe the calls, messages, quotes, and follow-ups eating your week. You'll get a clear build plan and a fixed CAD price — usually within a day.<\u002Fp>\n        <div style=\"margin-top:34px;display:flex;flex-wrap:wrap;gap:13px;justify-content:center\">\n          <a href=\"#qh-act3\" onclick=\"{{ onCatch }}\" style=\"display:inline-flex;align-items:center;gap:9px;height:56px;padding:0 30px;border-radius:15px;background:#14110F;color:#F6EFE6;font-size:16px;font-weight:700;text-decoration:none;box-shadow:0 18px 40px -14px rgba(20,17,15,.5)\">Start a build\n            <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fa>\n          <a href=\"#qh-top\" onclick=\"{{ onTop }}\" style=\"display:inline-flex;align-items:center;gap:8px;height:56px;padding:0 26px;border-radius:15px;background:transparent;border:1px solid rgba(30,22,14,.28);color:#1E160E;font-size:16px;font-weight:700;text-decoration:none\">Watch it again<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"margin-top:44px;display:inline-flex;align-items:center;gap:10px;padding:9px 16px;border-radius:999px;border:1px solid rgba(30,22,14,.16);background:rgba(255,255,255,.4);font-size:13px;color:#5A4632\">\n          <span style=\"display:inline-flex;width:24px;height:24px;border-radius:50%;background:#14110F;color:#F4A24C;align-items:center;justify-content:center;font-family:Archivo,sans-serif;font-weight:800;font-size:12px\">P<\u002Fspan>\n          Built by <b style=\"color:#1E160E\">Pavneet<\u002Fb> in Surrey/Delta, BC · real builder, no agency handoff\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:64px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#7A6248\">© 2026 Handbuilt · The Quiet Hours<\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:760},&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;}}\">\nclass Component extends DCLogic {\n  constructor(p){\n    super(p);\n    this.rootRef = React.createRef();\n    this.bgRef = React.createRef();\n    this.glRef = React.createRef();\n    this.grainRef = React.createRef();\n    this.tsRef = React.createRef(); this.tsLabelRef = React.createRef(); this.tsWrapRef = React.createRef();\n    this.railRef = React.createRef();\n    this.wordmarkRef = React.createRef(); this.navCtaRef = React.createRef();\n    this.soundRef = React.createRef(); this.soundDotRef = React.createRef(); this.soundTxtRef = React.createRef();\n    this.pourInputRef = React.createRef(); this.pourCanvasRef = React.createRef();\n    this.pourAnswerRef = React.createRef(); this.ansRouteRef = React.createRef(); this.ansTextRef = React.createRef();\n\n    this.gl = null; this.reduce = false; this.raf = 0; this.pods = {};\n    this.acts = ['qh-top','qh-act2','qh-act3','qh-act4','qh-act5','qh-act6','qh-act7'];\n    this.actLabels = ['I','II','III','IV','V','VI','VII'];\n    this.state = { p:0 };\n    this.sound = { on:false, ctx:null, nodes:null };\n    this._listeners = [];\n\n    this.regPod = (el)=>{ if(el) this.pods[el.getAttribute('data-pod')] = el; };\n    this.onTop = (e)=>{ e&&e.preventDefault(); this.scrollToId('qh-top'); };\n    this.onStart = (e)=>{ e&&e.preventDefault(); this.scrollToId('qh-act7'); };\n    this.onCatch = (e)=>{ e&&e.preventDefault(); this.scrollToId('qh-act3'); setTimeout(()=>{ this.pourInputRef.current&&this.pourInputRef.current.focus(); }, 700); };\n    this.onSound = ()=> this.toggleSound();\n    this.onPour = (e)=>{ e.preventDefault(); this.runPour(); };\n  }\n\n  // ---- night -> dawn palette ----\n  get stops(){\n    return [\n      [0.00,[10,14,20]], [0.22,[20,28,42]], [0.34,[42,54,70]],\n      [0.46,[58,68,82]], [0.60,[120,96,90]], [0.74,[212,140,72]],\n      [0.88,[244,176,108]], [1.00,[255,241,223]]\n    ];\n  }\n  colorAt(p){\n    // hard editorial cut for Act IV studio void\n    if(p>0.44 && p<0.56) return [11,11,15];\n    const s = this.stops; let a=s[0], b=s[s.length-1];\n    for(let i=0;i<s.length-1;i++){ if(p>=s[i][0] && p<=s[i+1][0]){ a=s[i]; b=s[i+1]; break; } }\n    const t = (p-a[0])/Math.max(0.0001,(b[0]-a[0]));\n    return [0,1,2].map(k=> Math.round(a[1][k]+(b[1][k]-a[1][k])*t));\n  }\n  hex(rgb){ return '#'+rgb.map(v=>v.toString(16).padStart(2,'0')).join(''); }\n\n  componentDidMount(){\n    this.reduce = !!this.props.reduceMotion || (window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches);\n    this.buildRail();\n    this.setupReveal();\n    this._onScrollEv = ()=> this.updateProgress();\n    window.addEventListener('scroll', this._onScrollEv, { passive:true });\n    document.addEventListener('scroll', this._onScrollEv, { passive:true, capture:true });\n    window.addEventListener('resize', this._onScrollEv, { passive:true });\n\n    window.__QH_LOST = ()=> this.useFallback();\n    if(this.reduce){ this.useFallback(); }\n    else { this.initGL(); this.setupPointer(); }\n    this.updateProgress();\n  }\n  componentWillUnmount(){\n    window.removeEventListener('scroll', this._onScrollEv);\n    document.removeEventListener('scroll', this._onScrollEv, true);\n    window.removeEventListener('resize', this._onScrollEv);\n    if(this._io) this._io.disconnect();\n    // NOTE: intentionally do NOT dispose the WebGL controller here — a canvas can\n    // only ever hold one WebGL context, so we keep it alive across React remounts\n    // (the persistent loop pauses itself when offscreen via the page's own logic).\n    if(this.sound.ctx){ try{this.sound.ctx.close();}catch(e){} }\n    this._listeners.forEach(([el,ev,fn])=> el.removeEventListener(ev,fn));\n  }\n  on(el,ev,fn,o){ if(!el)return; el.addEventListener(ev,fn,o); this._listeners.push([el,ev,fn]); }\n\n  initGL(){\n    const start = ()=>{\n      if(!window.QuietHoursGL || !this.glRef.current) return false;\n      try{\n        this.gl = window.QuietHoursGL.create(this.glRef.current);\n        if(!this.gl){ this.useFallback(); return true; }\n        if(this.glRef.current) this.glRef.current.style.display='block';\n        this._lastP = undefined;\n        return true;\n      }catch(e){ console.warn('GL init failed', e); this.useFallback(); return true; }\n    };\n    if(!start()){\n      let tries=0;\n      const iv = setInterval(()=>{ if(start() || ++tries>40){ clearInterval(iv); if(tries>40 && !this.gl) this.useFallback(); } }, 80);\n      window.addEventListener('qhgl-ready', ()=> start(), { once:true });\n    }\n  }\n  useFallback(){\n    if(this.glRef.current) this.glRef.current.style.display='none';\n  }\n\n  buildRail(){\n    const rail = this.railRef.current; if(!rail) return;\n    if(rail.children.length){ this._railBtns = Array.from(rail.children); return; }\n    this.acts.forEach((id,i)=>{\n      const b = document.createElement('button');\n      b.setAttribute('aria-label','Go to Act '+this.actLabels[i]);\n      b.style.cssText='display:flex;align-items:center;gap:9px;background:none;border:0;cursor:pointer;padding:0';\n      b.innerHTML='<span class=\"qh-num\" style=\"font-family:\\'JetBrains Mono\\',monospace;font-size:9.5px;letter-spacing:.1em;color:#7E8696;width:18px;text-align:right;transition:color .3s\">'+this.actLabels[i]+'<\u002Fspan><span class=\"qh-dot\" style=\"width:8px;height:8px;border-radius:50%;background:#7E8696;opacity:.5;transition:all .3s\"><\u002Fspan>';\n      b.addEventListener('click',()=> this.scrollToId(id));\n      rail.appendChild(b);\n    });\n    this._railBtns = Array.from(rail.children);\n  }\n\n  scrollToId(id){\n    const el = document.getElementById(id); if(!el) return;\n    const off = Math.max(window.scrollY||0, document.documentElement.scrollTop||0, document.body.scrollTop||0);\n    const top = el.getBoundingClientRect().top + off;\n    window.scrollTo({ top, behavior: this.reduce ? 'auto' : 'smooth' });\n  }\n\n  formatClock(p){\n    const start = 23*60+47, total = start + p*375;\n    let m = Math.round(total)%1440; if(m<0) m+=1440;\n    let h = Math.floor(m/60), mm = m%60;\n    const ap = h>=12 ? 'PM':'AM'; let h12 = h%12; if(h12===0) h12=12;\n    return h12+':'+String(mm).padStart(2,'0')+' '+ap;\n  }\n\n  updateProgress(){\n    const off = Math.max(window.scrollY||0, document.documentElement.scrollTop||0, document.body.scrollTop||0);\n    const sh = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);\n    const max0 = sh - window.innerHeight;\n    const p = max0>0 ? Math.max(0, Math.min(1, off/max0)) : 0;\n      this.state.p = p;\n\n      const rgb = this.colorAt(p), bgHex = this.hex(rgb);\n      const rgb2 = this.colorAt(Math.min(1, p+0.16));\n      const grad = 'linear-gradient(170deg, '+bgHex+' 0%, '+this.hex(rgb2)+' 100%)';\n      document.body.style.background = grad;\n      if(this.bgRef.current){ this.bgRef.current.style.background = grad; }\n\n      // timestamp\n      if(this.tsRef.current) this.tsRef.current.textContent = this.formatClock(p);\n      const lum = (0.299*rgb[0]+0.587*rgb[1]+0.114*rgb[2])/255;\n      const lightUI = lum < 0.5;\n      const uiCol = lightUI ? '#F6EFE6' : '#1E160E';\n      const subCol = lightUI ? '#C9C2B8' : '#5A4632';\n      if(this.tsRef.current) this.tsRef.current.style.color = uiCol;\n      if(this.tsLabelRef.current) this.tsLabelRef.current.style.color = subCol;\n      if(this.wordmarkRef.current)
