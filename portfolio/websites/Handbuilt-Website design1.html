document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

osest && e.target.closest('[data-spot]'); if(card && !card.hasAttribute('data-tilt')){ const r=card.getBoundingClientRect(); card.style.setProperty('--sx',((e.clientX-r.left)/r.width*100).toFixed(1)+'%'); card.style.setProperty('--sy',((e.clientY-r.top)/r.height*100).toFixed(1)+'%'); } };\n    this.on(root,'mousemove',move);\n  }\n  setupRipple(){\n    const root = this.rootRef.current; if(!root) return;\n    const tap=(e)=>{\n      const t = e.touches ? e.touches[0] : e;\n      const span = document.createElement('span');\n      span.style.cssText = `position:fixed;left:${t.clientX}px;top:${t.clientY}px;width:120px;height:120px;border-radius:50%;pointer-events:none;z-index:95;background:radial-gradient(circle,rgba(232,137,12,.35),transparent 65%);transform:translate(-50%,-50%) scale(0);animation:rippleFx .6s ease-out forwards`;\n      document.body.appendChild(span);\n      setTimeout(()=>span.remove(),650);\n    };\n    this.on(root,'touchstart',tap,{passive:true});\n  }\n\n  setupReveal(){\n    const root = this.rootRef.current; if(!root) return;\n    const els = root.querySelectorAll('[data-reveal]');\n    if('IntersectionObserver' in window){\n      this._io = new IntersectionObserver((ents)=>{\n        ents.forEach(en=>{ if(en.isIntersecting){ en.target.style.opacity='1'; en.target.style.transform='none'; this._io.unobserve(en.target);} });\n      }, { root, threshold:.12, rootMargin:'0px 0px -6% 0px' });\n      els.forEach(el=>this._io.observe(el));\n    } else { els.forEach(el=>{ el.style.opacity='1'; el.style.transform='none'; }); }\n  }\n\n  setupNav(){\n    const root = this.rootRef.current, nav = this.navRef.current, prog = this.progRef.current;\n    if(!root) return;\n    const onScroll = ()=>{\n      const max = root.scrollHeight - root.clientHeight;\n      const pct = max>0 ? (root.scrollTop/max)*100 : 0;\n      if(prog) prog.style.width = pct.toFixed(1)+'%';\n      if(nav){ const sc = root.scrollTop > 10; nav.style.boxShadow = sc ? '0 8px 30px -16px rgba(25,22,20,.28)' : 'none'; nav.style.background = sc ? 'rgba(250,247,242,.86)' : 'rgba(250,247,242,.72)'; }\n    };\n    this.on(root,'scroll',onScroll); onScroll();\n\n    if('IntersectionObserver' in window){\n      this._navIo = new IntersectionObserver((ents)=>{\n        ents.forEach(en=>{ if(en.isIntersecting && en.intersectionRatio>0.4){ const id=en.target.id; if(id && id!==this.state.active){ this.state.active=id; this.forceUpdate(); } } });\n      }, { root, threshold:[0.4,0.6] });\n      this.sections.forEach(id=>{ const el=root.querySelector('#'+id); if(el) this._navIo.observe(el); });\n    }\n  }\n\n  playDemo(key){\n    const d = this.demos[key]; if(!d) return;\n    const my = ++this.runId;\n    this.timers.forEach(t=>clearTimeout(t)); this.timers=[];\n    const sp = this.reduce ? .45 : 1;\n    this.setState({ demo:key, step:0, typing:true, done:false });\n    const stale = ()=> my!==this.runId;\n    const total = d.blocks.length;\n    let i = 0;\n    const tick = ()=>{\n      if(stale()) return;\n      if(i>=total){ this.setState({ typing:false, done:true }); return; }\n      this.setState({ typing:true });\n      const isAI = d.blocks[i].who==='ai';\n      this.timers.push(setTimeout(()=>{\n        if(stale()) return;\n        i++; this.setState({ step:i, typing:i<total });\n        this.timers.push(setTimeout(tick, 700*sp));\n      }, (isAI?1000:520)*sp));\n    };\n    this.timers.push(setTimeout(tick, 650*sp));\n  }\n\n  renderVals(){\n    const d = this.demos[this.state.demo] || this.demos.receptionist;\n    const blocks = d.blocks.slice(0, this.state.step).map(b=>({ isAI:b.who==='ai', isCust:b.who==='cust', text:b.text }));\n\n    const navMeta = [['demo','Demo'],['systems','AI Systems'],['pricing','Pricing']];\n    const navLinks = navMeta.map(([id,label])=>{\n      const active = this.state.active===id;\n      return { id, label, href:'#'+id, onClick:this.onNavClick,\n        style:'position:relative;font-size:14px;font-weight:600;text-decoration:none;padding:8px 13px;border-radius:9px;transition:color .2s;color:'+(active?'#191614':'#6F6862'),\n        dotStyle:'position:absolute;left:50%;bottom:2px;transform:translateX(-50%);width:'+(active?'16px':'0')+';height:2px;border-radius:2px;background:#E8890C;transition:width .25s' };\n    });\n\n    const tabMeta = [['receptionist','Receptionist'],['quote','Quote'],['followup','Follow-Up'],['invoice','Invoice Nudge'],['review','Review Reply'],['proposal','Proposal']];\n    const demoTabs = tabMeta.map(([key,label])=>{\n      const active = this.state.demo===key;\n      return { key, label, onClick:()=>this.playDemo(key),\n        style:'cursor:pointer;border:1px solid '+(active?'#E8890C':'rgba(246,239,230,.18)')+';background:'+(active?'#E8890C':'transparent')+';color:'+(active?'#15110F':'#B7AEA4')+';font-family:Inter,sans-serif;font-weight:700;font-size:12.5px;padding:9px 14px;border-radius:10px;transition:all .15s' };\n    });\n\n    const tints = { receptionist:['#FFF1DC','#C96F00'], quote:['#EAF1FE','#2F6BE0'], followup:['#E4F6EE','#0E9F6E'], invoice:['#F3EFE9','#191614'], review:['#FFF1DC','#C96F00'], proposal:['#EDEAFE','#5B4BD6'] };\n    const sysData = [\n      ['receptionist','AI Receptionist','Missed calls and slow replies turn into lost jobs.','Calls answered, triaged, and booked — you get clean lead details.','From $1,000','~5 days','Get this built'],\n      ['quote','AI Quote Agent','Vague requests mean you chase details for days.','It collects job type, photos, size, location, timing, and budget.','From $1,000','~5 days','Get this built'],\n      ['followup','AI Follow-Up Agent','Leads go cold because nobody follows up fast enough.','It follows up, answers questions, and pushes them to book.','From $1,500','1–2 wks','Get this built'],\n      ['invoice','AI Invoice Agent','Unpaid invoices drain your time and cash flow.','Polite reminders go out automatically until it\\u2019s paid.','From $1,500','1–2 wks','Get this built'],\n      ['review','AI Review Replier','Reviews pile up with no on-brand response.','Every review gets a thoughtful reply that protects your name.','From $1,000','~5 days','Get this built'],\n      ['proposal','AI Admin System','Your business runs on scattered texts and spreadsheets.','One connected flow for intake, follow-up, reminders, reporting.','From $2,500','2–3 wks','Plan my system'],\n    ];\n    const systems = sysData.map(([key,name,problem,outcome,price,time,cta])=>({ key,name,problem,outcome,price,time,cta, iconEl:this.ic(this.icons[key]), tintBg:tints[key][0], tintFg:tints[key][1] }));\n\n    const tiers = [\n      { tag:'AI Starter System', price:'$1,000', small:'CAD+', desc:'One AI worker, live in days — receptionist, quote intake, or review replies.', feat:false,\n        points:['1 AI worker, fully installed','Wired into your existing tools','Live in ~5 business days'] },\n      { tag:'AI Business System', price:'$2,500', small:'– $5,000', desc:'2–4 connected AI workers in one workflow, with a simple owner dashboard.', feat:true,\n        points:['2–4 connected workers','Receptionist + quote + follow-up','Owner dashboard & reporting'] },\n      { tag:'Custom AI App', price:'$7,500', small:'CAD+', desc:'A full app or internal platform you own — MVP, client portal, custom workflows.', feat:false,\n        points:['Custom build — you own it','SaaS MVP or client portal','Built around your process'] },\n    ].map(t=>{\n      const feat = t.feat;\n      return { ...t,\n        cardStyle:'opacity:0;transform:translateY(20px);transition:opacity .6s cubic-bezier(.22,1,.36,1),transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s;position:relative;display:flex;flex-direction:column;border-radius:20px;padding:28px 24px;'+(feat\n          ? 'background:linear-gradient(165deg,#221E1A,#14110F);border:1px solid #2C2722;box-shadow:0 40px 70px -30px rgba(25,22,20,.7),0 0 0 1px rgba(232,137,12,.18);transform:translateY(0) scale(1.04);z-index:2'\n          : 'background:#fff;border:1px solid
